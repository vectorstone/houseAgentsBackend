# 测试环境配置 - 使用 H2 内存数据库

# 服务器配置
server.port=0

# Spring 配置
spring.application.name=system-service-test

# H2 内存数据库配置
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# H2 控制台（可选，用于调试）
spring.h2.console.enabled=false

# JPA/Hibernate 配置
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# MyBatis-Plus 配置
mybatis-plus.type-aliases-package=com.house.agents.entity
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.mapper-locations=classpath*:/mapper/xml/*.xml
mybatis-plus.global-config.db-config.id-type=assign_id

# Redis 配置 - 使用嵌入式的 Redis
spring.redis.host=localhost
spring.redis.port=6370
spring.redis.password=

# 禁用 Jasypt 加密（测试环境不需要）
jasypt.encryptor.enabled=false

# Jackson 配置
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# 文件上传配置
spring.servlet.multipart.max-file-size=40MB
spring.servlet.multipart.max-request-size=50MB

# 日志配置
logging.level.root=INFO
logging.level.com.house.agents=DEBUG

# 禁用不需要的外部服务配置
aliyun.oss.schema=https
aliyun.oss.endpoint=oss-cn-beijing.aliyuncs.com
aliyun.oss.bucketName=test-bucket
